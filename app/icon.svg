<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- 漸層背景圓角方塊 -->
  <rect width="32" height="32" rx="8" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  <!-- 紙飛機 -->
  <g transform="translate(6, 6) scale(0.625)">
    <polygon points="2,22 30,6 16,18" fill="white" opacity="0.95"/>
    <polygon points="16,18 30,6 22,27" fill="white" opacity="0.8"/>
    <polygon points="16,18 30,6 17,30" fill="white" opacity="0.9"/>
    <line x1="16" y1="18" x2="30" y2="6" stroke="#bfdbfe" stroke-width="1"/>
  </g>
</svg>
